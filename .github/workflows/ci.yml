name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22.13.0"

      - name: Install (locked, verified)
        run: npm run install:ci

      - name: Lint
        run: npm run lint

      - name: Test (includes build)
        run: npm test
